<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Battle Ultra</title>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:black;
border:2px solid white;
}

button{
font-size:20px;
padding:10px 15px;
margin:4px;
}

#controls{
margin-top:10px;
}

</style>
</head>

<body>

<h2>🚀 Galaxy Battle Ultra</h2>

<div>
Score: <span id="score">0</span>
HP: <span id="hp">5</span>
</div>

<div>
Chọn tàu:
<button onclick="selectShip(1)">⚡</button>
<button onclick="selectShip(2)">🔥</button>
<button onclick="selectShip(3)">👾</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<div id="controls">

<div>
<button onclick="move('up')">⬆</button>
</div>

<div>
<button onclick="move('left')">⬅</button>
<button onclick="shoot()">🔫</button>
<button onclick="move('right')">➡</button>
</div>

<div>
<button onclick="move('down')">⬇</button>
</div>

</div>

<script>

let canvas=document.getElementById("game")
let ctx=canvas.getContext("2d")

let score=0
let hp=5
let shipType=1

let player={
x:180,
y:520,
speed:20
}

let bullets=[]
let enemies=[]
let explosions=[]
let boss=null

function selectShip(t){
shipType=t
}

function move(dir){

if(dir=="left")player.x-=player.speed
if(dir=="right")player.x+=player.speed
if(dir=="up")player.y-=player.speed
if(dir=="down")player.y+=player.speed

}

function shoot(){

bullets.push({
x:player.x+18,
y:player.y
})

}

function spawnEnemy(){

enemies.push({
x:Math.random()*360,
y:-20,
speed:2+Math.random()*2
})

}

setInterval(spawnEnemy,1200)

function spawnBoss(){

boss={
x:150,
y:-80,
w:100,
h:60,
hp:20
}

}

function explosion(x,y){

explosions.push({
x:x,
y:y,
t:20
})

}

function drawPlayer(){

if(shipType==1)ctx.fillStyle="cyan"
if(shipType==2)ctx.fillStyle="orange"
if(shipType==3)ctx.fillStyle="lime"

ctx.fillRect(player.x,player.y,40,30)

}

function update(){

ctx.clearRect(0,0,400,600)

drawPlayer()

for(let i=0;i<bullets.length;i++){

let b=bullets[i]

b.y-=8

ctx.fillStyle="red"
ctx.fillRect(b.x,b.y,4,10)

if(b.y<0)bullets.splice(i,1)

}

for(let i=0;i<enemies.length;i++){

let e=enemies[i]

e.y+=e.speed

ctx.fillStyle="white"
ctx.fillRect(e.x,e.y,30,30)

if(e.y>600){

hp--
document.getElementById("hp").innerText=hp
enemies.splice(i,1)

if(hp<=0)gameOver()

}

}

for(let i=0;i<bullets.length;i++){
for(let j=0;j<enemies.length;j++){

let b=bullets[i]
let e=enemies[j]

if(b&&e&&
b.x<e.x+30 &&
b.x+4>e.x &&
b.y<e.y+30 &&
b.y+10>e.y){

explosion(e.x,e.y)

bullets.splice(i,1)
enemies.splice(j,1)

score++

document.getElementById("score").innerText=score

if(score%15==0 && boss==null){
spawnBoss()
}

}

}
}

if(boss){

boss.y+=1

ctx.fillStyle="purple"
ctx.fillRect(boss.x,boss.y,boss.w,boss.h)

ctx.fillStyle="white"
ctx.fillText("BOSS:"+boss.hp,boss.x,boss.y-5)

for(let i=0;i<bullets.length;i++){

let b=bullets[i]

if(
b.x<boss.x+boss.w &&
b.x+4>boss.x &&
b.y<boss.y+boss.h &&
b.y+10>boss.y
){

bullets.splice(i,1)

boss.hp--

if(boss.hp<=0){

explosion(boss.x+50,boss.y+30)
boss=null
score+=10

}

}

}

}

for(let i=0;i<explosions.length;i++){

let ex=explosions[i]

ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(ex.x,ex.y,20-ex.t,0,Math.PI*2)
ctx.fill()

ex.t--

if(ex.t<=0)explosions.splice(i,1)

}

requestAnimationFrame(update)

}

function gameOver(){

alert("GAME OVER\nScore: "+score)
location.reload()

}

update()

</script>

</body>
</html>
